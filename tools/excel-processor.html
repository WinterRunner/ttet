                <div class="preview-box">
                    <div class="column-manager">
                        <div class="column-manager-title" id="columnManagerTitle">
                            选择要显示的列
                        </div>
                        <div class="column-list" id="columnList">
                            <!-- 列选项将通过JavaScript动态添加 -->
                        </div>
                    </div>
                    <h3>数据预览（目标Excel）</h3>
                    <div class="preview-table" id="dataPreview"></div>
                </div>
            </div>
            <div class="right-section">
                <div class="settings">
                    <div class="settings-group">
                        <div class="settings-group-title">
                            <i>📝</i> 数据处理
                        </div>
                        <select id="formatType">
                            <option value="none">不处理</option>
                            <option value="case">大小写处理</option>
                            <option value="datetime">时间格式</option>
                            <option value="duplicate">重复行处理</option>
                            <option value="merge">数据合并</option>
                        </select>
                        <div id="caseFormatOptions" style="display: none; margin-bottom: 10px;">
                            <select id="caseFormat" style="margin-top: 8px;">
                                <option value="uppercase">全部大写</option>
                                <option value="lowercase">全部小写</option>
                                <option value="capitalize">首字母大写</option>
                            </select>
                        </div>
                        <div id="mergeOptions" style="display: none; margin-bottom: 10px;">
                            <div class="merge-file-upload" style="border: 1px dashed #ccc; padding: 10px; border-radius: 4px; margin-top: 8px; cursor: pointer; text-align: center;">
                                <p style="margin: 0;">点击选择要合并的源Excel文件</p>
                                <p style="margin: 5px 0 0; font-size: 12px; color: #666;">支持选择多个文件</p>
                            </div>
                            <input type="file" id="mergeFileInput" accept=".xlsx,.xls" multiple style="display: none;">
                            <div id="selectedFiles" style="margin-top: 8px; font-size: 12px;"></div>
                            <div id="columnMappingContainer" style="margin-top: 15px; display: none;">
                                <div style="margin-bottom: 10px; font-weight: 500;">设置列对应关系：</div>
                                <div id="columnMappings"></div>
                                <button id="addMappingBtn" style="margin-top: 10px; padding: 5px 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
                                    添加列映射
                                </button>
                            </div>
                        </div>
                        <div id="duplicateOptions" style="display: none; margin-bottom: 10px;">
                            <select id="duplicateFormat" style="margin-top: 8px;">
                                <option value="remove">删除重复行</option>
                                <option value="mark">标记重复行</option>
                            </select>
                        </div>
                        <div id="datetimeFormatOptions" style="display: none; margin-bottom: 10px;">
                            <select id="datetimeFormat" style="margin-top: 8px;">
                                <option value="YYYY-MM-DD">YYYY-MM-DD（2024-03-21）</option>
                                <option value="YYYY/MM/DD">YYYY/MM/DD（2024/03/21）</option>
                                <option value="YYYY-MM-DD HH:mm:ss">YYYY-MM-DD HH:mm:ss（2024-03-21 15:30:00）</option>
                                <option value="YYYY/MM/DD HH:mm:ss">YYYY/MM/DD HH:mm:ss（2024/03/21 15:30:00）</option>
                                <option value="MM-DD-YYYY">MM-DD-YYYY（03-21-2024）</option>
                                <option value="DD-MM-YYYY">DD-MM-YYYY（21-03-2024）</option>
                            </select>
                        </div>
                        <div id="numberFormatOptions" style="display: none; margin-bottom: 10px;">
                            <select id="numberFormat" style="margin-top: 8px;">
                                <option value="integer">整数</option>
                                <option value="decimal1">保留1位小数</option>
                                <option value="decimal2">保留2位小数</option>
                                <option value="decimal3">保留3位小数</option>
                                <option value="decimal4">保留4位小数</option>
                            </select>
                        </div>
                        <div class="select-trigger" id="formatSelectTrigger">
                            选择需要处理的列
                        </div>
                        <div class="checkbox-group" id="formatColumns">
                            <!-- 选项将通过JavaScript动态添加 -->
                        </div>
                        <div class="selected-columns" id="selectedFormatColumns">
                            <!-- 已选择的列将在这里显示 -->
                        </div>
                    </div>
                </div>
                <button class="process-btn" id="processBtn" disabled>开始处理</button>
                <button class="download-btn" id="downloadBtn">下载处理后的文件</button>
                <div class="stats" id="stats"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2023 实用工具箱</p>
    </footer>

    <a href="../index.html" class="back-button" title="返回首页"></a>

    <script>
        /**
         * Excel数据处理工具的主要功能实现
         */
        document.addEventListener('DOMContentLoaded', () => {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const dataPreview = document.getElementById('dataPreview');
            const processBtn = document.getElementById('processBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const stats = document.getElementById('stats');
            const formatType = document.getElementById('formatType');
            const formatColumns = document.getElementById('formatColumns');
            const formatSelectTrigger = document.getElementById('formatSelectTrigger');
            const datetimeFormatOptions = document.getElementById('datetimeFormatOptions');
            const numberFormatOptions = document.getElementById('numberFormatOptions');
            const caseFormatOptions = document.getElementById('caseFormatOptions');
            const duplicateOptions = document.getElementById('duplicateOptions');
            const mergeOptions = document.getElementById('mergeOptions');
            const mergeFileUpload = document.querySelector('.merge-file-upload');
            const mergeFileInput = document.getElementById('mergeFileInput');
            const selectedFiles = document.getElementById('selectedFiles');

            let workbook = null;
            let currentSheet = null;
            let hiddenColumns = new Set(); // 存储隐藏的列索引
            let originalFileName = ''; // 添加变量存储原始文件名
            let filesToMerge = []; // 存储要合并的文件

            // 添加列映射相关变量
            let sourceHeaders = [];
            let targetHeaders = [];
            let columnMappings = [];

            // 处理文件拖放
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file && (file.name.endsWith('.xlsx') || file.name.endsWith('.xls'))) {
                    handleFile(file);
                } else {
                    showToast('请选择Excel文件(.xlsx或.xls)');
                }
            });

            // 处理文件选择
            dropZone.addEventListener('click', () => {
                fileInput.click();
            });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file && (file.name.endsWith('.xlsx') || file.name.endsWith('.xls'))) {
                    handleFile(file);
                } else {
                    showToast('请选择Excel文件(.xlsx或.xls)');
                }
            });

            // 添加列管理相关的事件监听
            const columnManagerTitle = document.getElementById('columnManagerTitle');
            const columnList = document.getElementById('columnList');

            columnManagerTitle.addEventListener('click', (e) => {
                e.stopPropagation();
                columnManagerTitle.classList.toggle('active');
                columnList.classList.toggle('show');
            });

            // 点击其他地方关闭下拉框
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.column-manager')) {
                    columnList.classList.remove('show');
                    columnManagerTitle.classList.remove('active');
                }
            });

            // 更新列显示设置
            function updateColumnManager(headers) {
                columnList.innerHTML = '';
                
                // 添加全选选项
                const selectAllItem = document.createElement('div');
                selectAllItem.className = 'column-select-all';
                
                const selectAllCheckbox = document.createElement('input');
                selectAllCheckbox.type = 'checkbox';
                selectAllCheckbox.id = 'select-all-columns';
                selectAllCheckbox.checked = hiddenColumns.size === 0;
                selectAllCheckbox.addEventListener('change', () => {
                    const isChecked = selectAllCheckbox.checked;
                    // 更新所有列的显示状态
                    columnList.querySelectorAll('.column-item input[type="checkbox"]').forEach(checkbox => {
                        checkbox.checked = isChecked;
                    });
                    // 更新隐藏列集合
                    if (isChecked) {
                        hiddenColumns.clear();
                    } else {
                        headers.forEach((_, index) => hiddenColumns.add(index));
                    }
                    // 更新预览显示
                    displayPreview(currentSheet, document.getElementById('dataPreview'));
                    // 更新可选择的列
                    updateKeyColumns();
                    // 更新选择框显示文本
                    updateColumnManagerText();
                });
                
                const selectAllLabel = document.createElement('label');
                selectAllLabel.htmlFor = 'select-all-columns';
                selectAllLabel.textContent = '全选';
                
                selectAllItem.appendChild(selectAllCheckbox);
                selectAllItem.appendChild(selectAllLabel);
                columnList.appendChild(selectAllItem);

                // 添加列选项
                headers.forEach((header, index) => {
                    const item = document.createElement('div');
                    item.className = 'column-item';
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = `col-visible-${index}`;
                    checkbox.checked = !hiddenColumns.has(index);
                    checkbox.addEventListener('change', () => {
                        if (checkbox.checked) {
                            hiddenColumns.delete(index);
                        } else {
                            hiddenColumns.add(index);
                        }
                        // 更新全选状态
                        selectAllCheckbox.checked = hiddenColumns.size === 0;
                        // 更新预览显示
                        displayPreview(currentSheet, document.getElementById('dataPreview'));
                        // 更新可选择的列
                        updateKeyColumns();
                        // 更新选择框显示文本
                        updateColumnManagerText();
                    });
                    
                    const label = document.createElement('label');
                    label.htmlFor = `col-visible-${index}`;
                    label.textContent = `${header} (列${index + 1})`;
                    
                    item.appendChild(checkbox);
                    item.appendChild(label);
                    columnList.appendChild(item);
                });
                updateColumnManagerText();
            }

            // 更新列管理选择框显示文本
            function updateColumnManagerText() {
                const visibleCount = columnList.querySelectorAll('input[type="checkbox"]:checked').length;
                const totalCount = columnList.querySelectorAll('input[type="checkbox"]').length;
                columnManagerTitle.textContent = `已选择 ${visibleCount}/${totalCount} 列`;
            }

            // 修改显示预览函数
            function displayPreview(sheet, container) {
                const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                if (jsonData.length === 0) {
                    container.innerHTML = '<p>无数据</p>';
                    return;
                }

                let html = '<table><thead><tr>';
                // 添加序号列表头
                html += '<th style="width: 50px; text-align: center;">序号</th>';
                // 表头
                jsonData[0].forEach((header, index) => {
                    if (!hiddenColumns.has(index)) {
                        html += `<th>${header || ''}</th>`;
                    }
                });
                html += '</tr></thead><tbody>';

                // 数据行
                for (let i = 1; i < jsonData.length; i++) {
                    html += '<tr>';
                    // 添加序号列
                    html += `<td style="text-align: center;">${i}</td>`;
                    jsonData[i].forEach((cell, index) => {
                        if (!hiddenColumns.has(index)) {
                            html += `<td>${cell || ''}</td>`;
                        }
                    });
                    html += '</tr>';
                }
                html += '</tbody></table>';

                container.innerHTML = html;
            }

            // 修改文件处理函数
            function handleFile(file) {
                const reader = new FileReader();
                
                // 保存原始文件名（去掉扩展名）
                originalFileName = file.name.replace(/\.[^/.]+$/, '');
                
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        workbook = XLSX.read(data, { type: 'array' });
                        currentSheet = workbook.Sheets[workbook.SheetNames[0]];
                        
                        // 重置隐藏列
                        hiddenColumns.clear();
                        
                        // 更新列显示设置
                        const jsonData = XLSX.utils.sheet_to_json(currentSheet, { header: 1 });
                        if (jsonData.length > 0) {
                            updateColumnManager(jsonData[0]);
                        }
                        
                        // 显示数据预览
                        displayPreview(currentSheet, document.getElementById('dataPreview'));
                        
                        // 更新关键列选项
                        updateKeyColumns();
                        
                        processBtn.disabled = false;
                    } catch (error) {
                        showToast('文件读取失败：' + error.message);
                    }
                };

                reader.onerror = () => {
                    showToast('文件读取失败');
                };

                reader.readAsArrayBuffer(file);
            }

            // 修改更新关键列选项函数
            function updateKeyColumns() {
                if (!currentSheet) return;
                
                const jsonData = XLSX.utils.sheet_to_json(currentSheet, { header: 1 });
                if (jsonData.length === 0) return;

                // 更新格式统一列选项
                const formatColumnsContainer = document.getElementById('formatColumns');
                formatColumnsContainer.innerHTML = '';
                jsonData[0].forEach((header, index) => {
                    if (hiddenColumns.has(index)) return; // 跳过隐藏的列
                    
                    const div = document.createElement('div');
                    div.className = 'checkbox-item';
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = `format-col-${index}`;
                    checkbox.value = header;
                    checkbox.addEventListener('change', () => {
                        updateSelectedColumns('format');
                        updateSelectTriggerText('format');
                    });
                    
                    const label = document.createElement('label');
                    label.htmlFor = `format-col-${index}`;
                    label.textContent = `${header} (列${index + 1})`;
                    
                    div.appendChild(checkbox);
                    div.appendChild(label);
                    formatColumnsContainer.appendChild(div);
                });
            }

            // 更新已选择的列显示
            function updateSelectedColumns(type) {
                const container = document.getElementById(`selected${type.charAt(0).toUpperCase() + type.slice(1)}Columns`);
                const checkboxes = document.querySelectorAll(`#${type}Columns input[type="checkbox"]:checked`);
                
                if (checkboxes.length === 0) {
                    container.classList.remove('show');
                    return;
                }

                container.innerHTML = '';
                checkboxes.forEach(checkbox => {
                    const span = document.createElement('span');
                    span.textContent = checkbox.value;
                    span.addEventListener('click', () => {
                        // 取消对应的复选框选中状态
                        checkbox.checked = false;
                        // 更新显示
                        updateSelectedColumns(type);
                        updateSelectTriggerText(type);
                    });
                    container.appendChild(span);
                });
                container.classList.add('show');
            }

            // 更新选择框显示文本
            function updateSelectTriggerText(type) {
                const trigger = document.getElementById(`${type}SelectTrigger`);
                const checkboxes = document.querySelectorAll(`#${type}Columns input[type="checkbox"]:checked`);
                
                if (checkboxes.length === 0) {
                    trigger.textContent = `选择${type === 'format' ? '需要统一格式' : '用于判断重复数据'}的列`;
                } else {
                    trigger.textContent = `已选择 ${checkboxes.length} 列`;
                }
            }

            // 处理下拉框点击
            formatSelectTrigger.addEventListener('click', (e) => {
                e.stopPropagation();
                formatColumns.classList.toggle('show');
                formatSelectTrigger.classList.toggle('active');
            });

            // 点击其他地方关闭下拉框
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.checkbox-group') && !e.target.closest('.select-trigger')) {
                    formatColumns.classList.remove('show');
                    formatSelectTrigger.classList.remove('active');
                }
            });

            // 修改数据处理和导出逻辑
            processBtn.addEventListener('click', async () => {
                if (!currentSheet) return;

                processBtn.classList.add('processing');
                processBtn.disabled = true;

                try {
                    await new Promise(resolve => setTimeout(resolve, 1500));

                    const jsonData = XLSX.utils.sheet_to_json(currentSheet, { header: 1 });
                    let processedData = jsonData.map(row => 
                        row.filter((_, index) => !hiddenColumns.has(index))
                    );
                    let statsText = [];

                    if (formatType.value === 'merge') {
                        if (filesToMerge.length === 0) {
                            showToast('请选择要合并的Excel文件');
                            processBtn.classList.remove('processing');
                            processBtn.disabled = false;
                            return;
                        }

                        if (columnMappings.length === 0) {
                            showToast('请设置列对应关系');
                            processBtn.classList.remove('processing');
                            processBtn.disabled = false;
                            return;
                        }

                        try {
                            // 执行合并操作
                            processedData = await mergeExcelFiles(currentSheet, filesToMerge);
                            statsText.push(`已合并 ${filesToMerge.length} 个文件的数据，共 ${processedData.length - 1} 行`);
                            
                            // 更新当前sheet
                            currentSheet = XLSX.utils.aoa_to_sheet(processedData);
                            
                            // 更新预览显示
                            displayPreview(currentSheet, document.getElementById('dataPreview'));
                            
                            // 清空已选择的文件
                            filesToMerge = [];
                            selectedFiles.innerHTML = '';
                            mergeFileInput.value = '';
                            document.getElementById('columnMappingContainer').style.display = 'none';
                        } catch (error) {
                            throw new Error('数据合并失败：' + error.message);
                        }
                    } else {
                        const formatCheckboxes = document.querySelectorAll('#formatColumns input[type="checkbox"]:checked');
                        if (formatCheckboxes.length === 0) {
                            showToast('请选择需要处理的列');
                            processBtn.classList.remove('processing');
                            processBtn.disabled = false;
                            return;
                        }

                        const formatCols = Array.from(formatCheckboxes).map(checkbox => checkbox.value);
                        const headerRow = processedData[0];
                        const formatIndices = formatCols.map(col => {
                            const index = headerRow.findIndex(h => h === col);
                            if (index === -1) {
                                throw new Error(`未找到列：${col}`);
                            }
                            return index;
                        });

                        if (formatType.value === 'duplicate') {
                            const duplicateFormat = document.getElementById('duplicateFormat').value;
                            if (duplicateFormat === 'remove') {
                                const seen = new Map();
                                processedData = processedData.filter((row, index) => {
                                    if (index === 0) return true; // 保留表头
                                    const key = formatIndices.map(i => row[i]).join('|');
                                    if (seen.has(key)) return false;
                                    seen.set(key, true);
                                    return true;
                                });
                                statsText.push(`已删除 ${jsonData.length - processedData.length} 行重复数据`);
                            } else {
                                const seen = new Map();
                                processedData = processedData.map((row, rowIndex) => {
                                    if (rowIndex === 0) return row; // 跳过表头
                                    return row.map((cell, cellIndex) => {
                                        if (formatIndices.includes(cellIndex)) {
                                            if (seen.has(cell)) {
                                                return `[重复] ${cell}`;
                                            }
                                            seen.set(cell, true);
                                            return cell;
                                        }
                                        return cell;
                                    });
                                });
                                statsText.push(`已标记${formatCols.length}列的重复数据`);
                            }
                        } else if (formatType.value === 'case') {
                            const caseFormat = document.getElementById('caseFormat').value;
                            processedData = processedData.map((row, rowIndex) => {
                                if (rowIndex === 0) return row; // 跳过表头
                                return row.map((cell, cellIndex) => {
                                    if (formatIndices.includes(cellIndex)) {
                                        let processedValue;
                                        switch (caseFormat) {
                                            case 'uppercase':
                                                processedValue = typeof cell === 'string' ? cell.toUpperCase() : cell;
                                                break;
                                            case 'lowercase':
                                                processedValue = typeof cell === 'string' ? cell.toLowerCase() : cell;
                                                break;
                                            case 'capitalize':
                                                processedValue = typeof cell === 'string' 
                                                    ? cell.split(' ').map(word => 
                                                        word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
                                                    ).join(' ') 
                                                    : cell;
                                                break;
                                            default:
                                                processedValue = cell;
                                        }
                                        return processedValue;
                                    }
                                    return cell;
                                });
                            });

                            // 更新统计信息
                            let formatTypeText = '';
                            switch (caseFormat) {
                                case 'uppercase':
                                    formatTypeText = '转大写';
                                    break;
                                case 'lowercase':
                                    formatTypeText = '转小写';
                                    break;
                                case 'capitalize':
                                    formatTypeText = '首字母大写';
                                    break;
                            }
                            statsText.push(`已完成${formatCols.length}列${formatTypeText}处理`);
                        } else if (formatType.value === 'datetime') {
                            processedData = processedData.map((row, rowIndex) => {
                                if (rowIndex === 0) return row; // 跳过表头
                                return row.map((cell, cellIndex) => {
                                    if (formatIndices.includes(cellIndex)) {
                                        const datetimeFormat = document.getElementById('datetimeFormat').value;
                                        return formatDateTime(cell, datetimeFormat);
                                    }
                                    return cell;
                                });
                            });
                            statsText.push(`已完成${formatCols.length}列时间格式化处理`);
                        }

                        // 将处理后的数据写回到currentSheet
                        currentSheet = XLSX.utils.aoa_to_sheet(processedData);
                    }

                    // 更新数据预览
                    displayPreview(currentSheet, document.getElementById('dataPreview'));

                    // 更新列选项
                    updateKeyColumns();

                    // 清空已选择的列
                    clearSelectedColumns();

                    // 显示统计信息
                    stats.textContent = statsText.join(' | ');
                    stats.style.display = 'block';

                    // 显示下载按钮
                    downloadBtn.style.display = 'block';
                    downloadBtn.onclick = () => {
                        // 获取当前时间
                        const now = new Date();
                        const timestamp = now.getFullYear() +
                            String(now.getMonth() + 1).padStart(2, '0') +
                            String(now.getDate()).padStart(2, '0') +
                            String(now.getHours()).padStart(2, '0') +
                            String(now.getMinutes()).padStart(2, '0') +
                            String(now.getSeconds()).padStart(2, '0');
                        
                        // 组合新的文件名：原文件名_处理时间.xlsx
                        const newFileName = `${originalFileName}_${timestamp}.xlsx`;
                        
                        const newWorkbook = XLSX.utils.book_new();
                        XLSX.utils.book_append_sheet(newWorkbook, currentSheet, 'Sheet1');
                        // 设置写入选项，保持数字格式
                        XLSX.writeFile(newWorkbook, newFileName, {
                            bookType: 'xlsx',
                            type: 'binary',
                            cellStyles: true,
                            cellDates: true,
                            bookSST: true
                        });
                    };

                    // 重置处理选项
                    resetProcessOptions();

                    // 移除处理中状态
                    processBtn.classList.remove('processing');
                    processBtn.disabled = false;

                    // 显示成功提示
                    showToast('数据处理完成', 'success');

                } catch (error) {
                    // 发生错误时移除处理中状态
                    processBtn.classList.remove('processing');
                    processBtn.disabled = false;
                    showToast('数据处理失败：' + error.message);
                }
            });

            // 清空已选择的列
            function clearSelectedColumns() {
                // 取消所有复选框的选中状态
                document.querySelectorAll('#formatColumns input[type="checkbox"]')
                    .forEach(checkbox => {
                        checkbox.checked = false;
                    });

                // 更新显示
                updateSelectedColumns('format');
                updateSelectTriggerText('format');
            }

            // 重置处理选项
            function resetProcessOptions() {
                formatType.value = 'none';
                datetimeFormatOptions.style.display = 'none';
                caseFormatOptions.style.display = 'none';
                duplicateOptions.style.display = 'none';
                mergeOptions.style.display = 'none';
                numberFormatOptions.style.display = 'none';
                // 清空合并文件选择
                filesToMerge = [];
                selectedFiles.innerHTML = '';
                mergeFileInput.value = '';
            }

            // 错误处理
            function showToast(message, type = 'error') {
                // 移除现有的toast
                const existingToast = document.querySelector('.toast');
                if (existingToast) {
                    existingToast.remove();
                }

                // 创建新的toast
                const toast = document.createElement('div');
                toast.className = `toast ${type === 'success' ? 'success' : ''}`;
                toast.textContent = message;

                // 添加到页面
                document.body.appendChild(toast);

                // 3秒后自动移除
                setTimeout(() => {
                    toast.remove();
                }, 3000);
            }

            // 修改formatType的change事件监听器
            formatType.addEventListener('change', () => {
                if (formatType.value === 'none') {
                    datetimeFormatOptions.style.display = 'none';
                    caseFormatOptions.style.display = 'none';
                    duplicateOptions.style.display = 'none';
                    mergeOptions.style.display = 'none';
                    formatSelectTrigger.style.display = 'none';
                    document.getElementById('selectedFormatColumns').style.display = 'none';
                } else if (formatType.value === 'datetime') {
                    datetimeFormatOptions.style.display = 'block';
                    caseFormatOptions.style.display = 'none';
                    duplicateOptions.style.display = 'none';
                    mergeOptions.style.display = 'none';
                    formatSelectTrigger.style.display = 'block';
                } else if (formatType.value === 'case') {
                    datetimeFormatOptions.style.display = 'none';
                    caseFormatOptions.style.display = 'block';
                    duplicateOptions.style.display = 'none';
                    mergeOptions.style.display = 'none';
                    formatSelectTrigger.style.display = 'block';
                } else if (formatType.value === 'duplicate') {
                    datetimeFormatOptions.style.display = 'none';
                    caseFormatOptions.style.display = 'none';
                    duplicateOptions.style.display = 'block';
                    mergeOptions.style.display = 'none';
                    formatSelectTrigger.style.display = 'block';
                } else if (formatType.value === 'merge') {
                    datetimeFormatOptions.style.display = 'none';
                    caseFormatOptions.style.display = 'none';
                    duplicateOptions.style.display = 'none';
                    mergeOptions.style.display = 'block';
                    formatSelectTrigger.style.display = 'none';
                    document.getElementById('selectedFormatColumns').style.display = 'none';
                }
            });

            // 页面加载时触发一次change事件，设置默认状态
            formatType.dispatchEvent(new Event('change'));

            // 添加数字格式化函数
            function formatNumber(value, format) {
                // 尝试将值转换为数字
                let num = parseFloat(value);
                
                // 如果转换失败，返回原始值
                if (isNaN(num)) {
                    return value;
                }

                // 根据选择的格式返回数字（不是字符串）
                switch (format) {
                    case 'integer':
                        return Math.round(num);
                    case 'decimal1':
                        return Number(num.toFixed(1));
                    case 'decimal2':
                        return Number(num.toFixed(2));
                    case 'decimal3':
                        return Number(num.toFixed(3));
                    case 'decimal4':
                        return Number(num.toFixed(4));
                    default:
                        return num;
                }
            }

            // 修改处理数据部分的代码
            function formatDateTime(dateStr, format) {
                // 尝试解析日期字符串
                let date = new Date(dateStr);
                
                // 如果解析失败，尝试其他常见格式
                if (isNaN(date.getTime())) {
                    // 尝试解析 "DD-MM-YYYY" 格式
                    const parts = dateStr.split(/[-/]/);
                    if (parts.length === 3) {
                        // 尝试不同的日期组合
                        date = new Date(parts[2], parts[1] - 1, parts[0]);
                        if (isNaN(date.getTime())) {
                            date = new Date(parts[2], parts[0] - 1, parts[1]);
                        }
                    }
                }

                if (isNaN(date.getTime())) {
                    return dateStr; // 如果仍然无法解析，返回原始字符串
                }

                // 格式化日期
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                const seconds = String(date.getSeconds()).padStart(2, '0');

                // 根据选择的格式返回
                switch (format) {
                    case 'YYYY-MM-DD':
                        return `${year}-${month}-${day}`;
                    case 'YYYY/MM/DD':
                        return `${year}/${month}/${day}`;
                    case 'YYYY-MM-DD HH:mm:ss':
                        return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
                    case 'YYYY/MM/DD HH:mm:ss':
                        return `${year}/${month}/${day} ${hours}:${minutes}:${seconds}`;
                    case 'MM-DD-YYYY':
                        return `${month}-${day}-${year}`;
                    case 'DD-MM-YYYY':
                        return `${day}-${month}-${year}`;
                    default:
                        return dateStr;
                }
            }

            // 添加合并文件选择功能
            mergeFileUpload.addEventListener('click', () => {
                mergeFileInput.click();
            });

            // 修改数据选择处理
            mergeFileInput.addEventListener('change', async (e) => {
                const files = Array.from(e.target.files);
                filesToMerge = files;
                
                // 显示选择的文件
                selectedFiles.innerHTML = files.map((file, index) => `
                    <div style="margin: 4px 0; display: flex; justify-content: space-between; align-items: center;">
                        <span style="flex: 1; overflow: hidden; text-overflow: ellipsis;">${file.name}</span>
                        <span class="delete-file" data-index="${index}" style="cursor: pointer; color: #dc3545; margin-left: 8px; padding: 2px 6px;">×</span>
                    </div>
                `).join('');

                // 添加删除事件监听
                const deleteButtons = selectedFiles.querySelectorAll('.delete-file');
                deleteButtons.forEach(button => {
                    button.addEventListener('click', (e) => {
                        const index = parseInt(e.target.dataset.index);
                        filesToMerge = filesToMerge.filter((_, i) => i !== index);
                        updateSelectedFiles();
                        if (filesToMerge.length === 0) {
                            document.getElementById('columnMappingContainer').style.display = 'none';
                        }
                    });
                });

                // 如果有选择文件，读取目标文件的表头
                if (files.length > 0) {
                    try {
                        const reader = new FileReader();
                        reader.onload = async (e) => {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            const sheet = workbook.Sheets[workbook.SheetNames[0]];
                            const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                            
                            if (jsonData.length > 0) {
                                targetHeaders = jsonData[0];
                                // 获取源文件（当前预览的文件）的表头
                                sourceHeaders = XLSX.utils.sheet_to_json(currentSheet, { header: 1 })[0];
                                
                                // 显示列映射界面
                                document.getElementById('columnMappingContainer').style.display = 'block';
                                // 初始化一个默认的映射
                                columnMappings = [];
                                updateColumnMappingUI();
                            }
                        };
                        reader.readAsArrayBuffer(files[0]);
                    } catch (error) {
                        showToast('读取文件表头失败：' + error.message);
                    }
                }
            });

            // 添加列映射相关函数
            function createMappingRow() {
                const mappingDiv = document.createElement('div');
                mappingDiv.className = 'mapping-row';
                
                // 源列选择
                const sourceSelect = document.createElement('select');
                sourceSelect.innerHTML = `
                    <option value="">源列</option>
                    ${sourceHeaders.map((header, index) => `
                        <option value="${index}">${header}</option>
                    `).join('')}
                `;

                // 箭头
                const arrow = document.createElement('div');
                arrow.className = 'mapping-arrow';
                arrow.textContent = '→';

                // 目标列选择
                const targetSelect = document.createElement('select');
                targetSelect.innerHTML = `
                    <option value="">目标列</option>
                    ${targetHeaders.map((header, index) => `
                        <option value="${index}">${header}</option>
                    `).join('')}
                `;

                // 删除按钮
                const deleteBtn = document.createElement('span');
                deleteBtn.className = 'delete-mapping';
                deleteBtn.textContent = '×';
                deleteBtn.onclick = async () => {
                    mappingDiv.remove();
                    await updateColumnMappings();
                };

                // 添加change事件监听
                sourceSelect.onchange = updateColumnMappings;
                targetSelect.onchange = updateColumnMappings;

                mappingDiv.appendChild(sourceSelect);
                mappingDiv.appendChild(arrow);
                mappingDiv.appendChild(targetSelect);
                mappingDiv.appendChild(deleteBtn);

                return mappingDiv;
            }

            function updateColumnMappingUI() {
                const container = document.getElementById('columnMappings');
                container.innerHTML = '';
                
                // 如果没有映射，添加一个默认的
                if (columnMappings.length === 0) {
                    container.appendChild(createMappingRow());
                } else {
                    columnMappings.forEach(() => {
                        container.appendChild(createMappingRow());
                    });
                }
            }

            // 添加"添加列映射"按钮的点击事件监听器
            document.getElementById('addMappingBtn').addEventListener('click', () => {
                const container = document.getElementById('columnMappings');
                container.appendChild(createMappingRow());
            });

            function updateColumnMappings() {
                const mappingRows = document.querySelectorAll('.mapping-row');
                columnMappings = Array.from(mappingRows).map(row => {
                    const sourceIndex = row.querySelector('select:first-child').value;
                    const targetIndex = row.querySelector('select:last-of-type').value;
                    return {
                        sourceIndex: parseInt(sourceIndex),
                        targetIndex: parseInt(targetIndex)
                    };
                }).filter(mapping => !isNaN(mapping.sourceIndex) && !isNaN(mapping.targetIndex));
            }

            // 修改合并处理函数
            async function mergeExcelFiles(baseSheet, files) {
                const baseData = XLSX.utils.sheet_to_json(baseSheet, { header: 1 });
                let mergedData = [...baseData];

                // 验证是否设置了列映射
                if (columnMappings.length === 0) {
                    return mergedData;
                }

                for (const file of files) {
                    const reader = new FileReader();
                    await new Promise((resolve, reject) => {
                        reader.onload = (e) => {
                            try {
                                const data = new Uint8Array(e.target.result);
                                const workbook = XLSX.read(data, { type: 'array' });
                                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                                const jsonData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                                
                                // 跳过表头，处理数据行
                                const dataRows = jsonData.slice(1);
                                
                                // 根据映射关系合并数据
                                dataRows.forEach(row => {
                                    const newRow = [...mergedData[0].map(() => '')]; // 创建一个与基础数据相同列数的空行
                                    // 根据映射关系填充数据
                                    columnMappings.forEach(mapping => {
                                        if (row[mapping.targetIndex] !== undefined && row[mapping.targetIndex] !== null) {
                                            newRow[mapping.sourceIndex] = row[mapping.targetIndex];
                                        }
                                    });
                                    // 只有当行中至少有一个非空值时才添加该行
                                    if (newRow.some(cell => cell !== '')) {
                                        mergedData.push(newRow);
                                    }
                                });
                                
                                resolve();
                            } catch (error) {
                                reject(error);
                            }
                        };
                        reader.onerror = () => reject(new Error('文件读取失败'));
                        reader.readAsArrayBuffer(file);
                    });
                }

                return mergedData;
            }
        });
    </script>
